openapi: 3.1.0
info:
  title: Agentic Data Pipeline Ingestor
  description: Enterprise-grade agentic data pipeline for document ingestion
  version: 1.0.0
paths:
  /health:
    get:
      tags:
      - Health
      summary: Health Check
      description: "Comprehensive health check endpoint.\n\nPerforms health checks\
        \ on all critical components:\n- Database\n- Redis\n- LLM Providers\n- Destinations\n\
        - Storage\n- OpenTelemetry\n- Vector Store\n\nReturns:\n    Comprehensive\
        \ health status of all components"
      operationId: health_check_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComprehensiveHealthResponse'
  /health/ready:
    get:
      tags:
      - Health
      summary: Readiness Probe
      description: "Kubernetes readiness probe.\n\nChecks if the service is ready\
        \ to receive traffic.\nThis should return success when all required dependencies\
        \ are available.\n\nReturns:\n    Readiness status"
      operationId: readiness_probe_health_ready_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessResponse'
  /health/live:
    get:
      tags:
      - Health
      summary: Liveness Probe
      description: "Kubernetes liveness probe.\n\nChecks if the service is alive and\
        \ should not be restarted.\nThis is a lightweight check that just verifies\
        \ the process is running.\n\nReturns:\n    Liveness status"
      operationId: liveness_probe_health_live_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LivenessResponse'
