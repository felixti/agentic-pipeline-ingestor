            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Create Job Api V1 Jobs Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
