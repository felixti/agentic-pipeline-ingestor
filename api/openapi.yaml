                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/rag/query:
    post:
      tags:
      - RAG
      summary: Execute RAG query
      description: "Execute a Retrieval-Augmented Generation query with the specified\
        \ strategy.\n    \n    The endpoint:\n    1. Classifies the query type (factual,\
        \ analytical, comparative, vague, multi_hop)\n    2. Selects optimal strategies\
        \ based on query type and preset\n    3. Rewrites the query for better retrieval\n\
        \    4. Retrieves relevant documents\n    5. Re-ranks results (if enabled)\n\
        \    6. Evaluates quality and self-corrects if needed\n    7. Generates the\
        \ final answer with source attribution\n    \n    **Strategy Presets:**\n\
        \    - `auto`: Automatically selects strategies based on query classification\n\
        \    - `fast`: Prioritizes speed (query_rewrite + hybrid_search only)\n  \
        \  - `balanced`: Balanced approach with reranking (default)\n    - `thorough`:\
        \ Maximum quality with HyDE and all optimizations"
      operationId: rag_query_api_v1_rag_query_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RAGQueryRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGQueryResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGValidationErrorResponse'
        '500':
          description: RAG processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGQueryErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/rag/strategies:
    get:
      tags:
      - RAG
      summary: List available RAG strategies
      description: "Get information about all available RAG strategy presets.\n  \
        \  \n    Returns details about each strategy including:\n    - Configuration\
        \ settings (query_rewrite, hyde, reranking, hybrid_search)\n    - Recommended\
        \ use cases\n    - Estimated latency"
      operationId: list_strategies_api_v1_rag_strategies_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGStrategiesResponse'
  /api/v1/rag/strategies/{name}/evaluate:
    post:
      tags:
      - RAG
      summary: Evaluate a RAG strategy
      description: "Evaluate a specific RAG strategy against a test query with optional\
        \ ground truth.\n    \n    This endpoint is useful for:\n    - Comparing strategy\
        \ performance on specific query types\n    - Validating strategy configurations\n\
        \    - Benchmarking before production deployment\n    \n    Provide ground_truth_relevant_ids\
        \ and ground_truth_answer for comprehensive evaluation\n    including both\
        \ retrieval and generation metrics."
      operationId: evaluate_strategy_api_v1_rag_strategies__name__evaluate_post
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
          title: Name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RAGStrategyEvaluateRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGStrategyEvaluateResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGValidationErrorResponse'
        '404':
          description: Strategy not found
        '500':
          description: Evaluation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGQueryErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/rag/metrics:
    get:
      tags:
      - RAG
      summary: Get RAG system metrics
      description: "Retrieve current metrics for the RAG system.\n    \n    Returns:\n\
        \    - Summary statistics (total queries, average latency, quality scores)\n\
        \    - Component health status\n    - Recent evaluation alerts\n    - Performance\
        \ trends\n    \n    Note: This endpoint returns real-time metrics. For historical\
        \ data,\n    use the audit logs or monitoring dashboards."
      operationId: get_metrics_api_v1_rag_metrics_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGMetricsResponse'
  /api/v1/rag/evaluate:
    post:
      tags:
      - RAG
      summary: Run benchmark evaluation
      description: "Run a benchmark evaluation of the RAG system against a standard\
        \ dataset.\n    \n    This endpoint is useful for:\n    - Assessing overall\
        \ RAG system quality\n    - Comparing strategy performance\n    - Regression\
        \ testing\n    - Capacity planning\n    \n    **Benchmarks:**\n    - `ms_marco`:\
        \ Microsoft MARCO dataset (if available)\n    - `custom_qa`: Custom question-answer\
        \ pairs (if configured)\n    \n    Note: Benchmark runs can take several minutes\
        \ depending on max_queries.\n    Consider using async processing for large\
        \ benchmarks."
      operationId: run_benchmark_api_v1_rag_evaluate_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RAGBenchmarkRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGBenchmarkResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGValidationErrorResponse'
        '500':
          description: Benchmark failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RAGQueryErrorResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
components:
  schemas:
    ChunkJobMismatchResponse:
      properties:
        detail:
          type: string
          title: Detail
          default: Chunk does not belong to the specified job
      type: object
      title: ChunkJobMismatchResponse
      description: Error response when chunk doesn't belong to job.
    ComponentHealth:
      properties:
        status:
          $ref: '#/components/schemas/HealthStatus'
        latency_ms:
          anyOf:
          - type: integer
          - type: 'null'
          title: Latency Ms
        message:
          anyOf:
          - type: string
          - type: 'null'
          title: Message
      type: object
      required:
      - status
      title: ComponentHealth
      description: Health status of a system component.
    ComprehensiveHealthResponse:
      properties:
        status:
          $ref: '#/components/schemas/HealthStatus'
        timestamp:
          type: string
          title: Timestamp
        version:
          type: string
          title: Version
        environment:
          type: string
          title: Environment
        components:
          additionalProperties:
            $ref: '#/components/schemas/ComponentHealth'
          type: object
          title: Components
        overall_healthy:
          type: boolean
          title: Overall Healthy
      type: object
      required:
      - status
      - timestamp
      - version
      - environment
      - components
      - overall_healthy
      title: ComprehensiveHealthResponse
      description: Comprehensive health check response.
    DocumentChunkListItem:
      properties:
        id:
          type: string
          format: uuid
          title: Id
          description: Unique chunk identifier
        job_id:
          type: string
          format: uuid
          title: Job Id
          description: Parent job identifier
        chunk_index:
          type: integer
          minimum: 0.0
          title: Chunk Index
          description: Position within document (0-indexed)
        content:
          type: string
          title: Content
          description: Text content of the chunk
        content_hash:
          anyOf:
          - type: string
          - type: 'null'
          title: Content Hash
          description: SHA-256 hash for deduplication
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
          description: Chunk metadata (page numbers, etc.)
        created_at:
          type: string
          format: date-time
          title: Created At
          description: Timestamp of record creation
      type: object
      required:
      - id
      - job_id
      - chunk_index
      - content
      - created_at
      title: DocumentChunkListItem
      description: 'List item response for document chunks (excludes embedding by
        default).


        Used in list endpoints where embedding data is excluded for performance.'
    DocumentChunkListResponse:
      properties:
        items:
          items:
            $ref: '#/components/schemas/DocumentChunkListItem'
          type: array
          title: Items
          description: List of chunks
        total:
          type: integer
          minimum: 0.0
          title: Total
          description: Total number of chunks for this job
        limit:
          type: integer
          maximum: 1000.0
          minimum: 1.0
          title: Limit
          description: Number of items returned
        offset:
          type: integer
          minimum: 0.0
          title: Offset
          description: Offset from start of results
      type: object
      required:
      - total
      - limit
      - offset
      title: DocumentChunkListResponse
      description: Response model for paginated chunk list.
    DocumentChunkResponse:
      properties:
        id:
          type: string
          format: uuid
          title: Id
          description: Unique chunk identifier
        job_id:
          type: string
          format: uuid
          title: Job Id
          description: Parent job identifier
        chunk_index:
          type: integer
          minimum: 0.0
          title: Chunk Index
          description: Position within document (0-indexed)
        content:
          type: string
          title: Content
          description: Text content of the chunk
        content_hash:
          anyOf:
          - type: string
          - type: 'null'
          title: Content Hash
          description: SHA-256 hash for deduplication
        embedding:
          anyOf:
          - items:
              type: number
            type: array
          - type: 'null'
          title: Embedding
          description: Vector embedding for semantic search (only when requested)
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
          description: Chunk metadata (page numbers, etc.)
        created_at:
          type: string
          format: date-time
          title: Created At
          description: Timestamp of record creation
      type: object
      required:
      - id
      - job_id
      - chunk_index
      - content
      - created_at
      title: DocumentChunkResponse
      description: 'Response model for a single document chunk.


        Used for both list items and detailed responses. The embedding field

        is only included when explicitly requested via include_embedding parameter.'
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    HealthStatus:
      type: string
      enum:
      - healthy
      - degraded
      - unhealthy
      title: HealthStatus
      description: Component health status.
    HybridSearchRequest:
      properties:
        query:
          type: string
          maxLength: 1024
          minLength: 1
          title: Query
          description: Search query text
        top_k:
          type: integer
          maximum: 100.0
          minimum: 1.0
          title: Top K
          description: Maximum number of results to return
          default: 10
        vector_weight:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Vector Weight
          description: Weight for vector search scores
          default: 0.7
        text_weight:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Text Weight
          description: Weight for text search scores
          default: 0.3
        fusion_method:
          type: string
          pattern: ^(weighted_sum|rrf)$
          title: Fusion Method
          description: 'Fusion method: ''weighted_sum'' or ''rrf'' (reciprocal rank
            fusion)'
          default: weighted_sum
        min_similarity:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Min Similarity
          description: Minimum similarity threshold for vector search
          default: 0.5
        filters:
          additionalProperties: true
          type: object
          title: Filters
          description: Optional filters (e.g., job_id)
      type: object
      required:
      - query
      title: HybridSearchRequest
      description: 'Request body for hybrid search.


        Combines vector similarity search and text search using configurable fusion
        methods

        (weighted sum or reciprocal rank fusion).'
      example:
        filters: {}
        fusion_method: weighted_sum
        min_similarity: 0.5
        query: neural network architecture
        text_weight: 0.3
        top_k: 10
        vector_weight: 0.7
    HybridSearchResultItem:
      properties:
        chunk_id:
          type: string
          title: Chunk Id
          description: Unique chunk identifier
        job_id:
          type: string
          title: Job Id
          description: Parent job identifier
        chunk_index:
          type: integer
          minimum: 0.0
          title: Chunk Index
          description: Position within document
        content:
          type: string
          title: Content
          description: Text content of the chunk
        metadata:
          additionalProperties: true
          type: object
          title: Metadata
          description: Chunk metadata
        hybrid_score:
          type: number
          title: Hybrid Score
          description: Combined hybrid score (0-1)
        vector_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Vector Score
          description: Vector similarity score (0-1) if available
        text_score:
          anyOf:
          - type: number
          - type: 'null'
          title: Text Score
          description: Text search score (0-1) if available
        vector_rank:
          anyOf:
          - type: integer
          - type: 'null'
          title: Vector Rank
          description: Rank in vector search results
        text_rank:
          anyOf:
          - type: integer
          - type: 'null'
          title: Text Rank
          description: Rank in text search results
        rank:
          type: integer
          minimum: 1.0
          title: Rank
          description: Final rank (1-based)
        fusion_method:
          type: string
          title: Fusion Method
          description: Fusion method used
        content_source_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Content Source Name
          description: Name of the content source (file name or source URI)
      type: object
      required:
      - chunk_id
      - job_id
      - chunk_index
      - content
      - hybrid_score
      - rank
      - fusion_method
      title: HybridSearchResultItem
      description: Hybrid search result with component scores.
      example:
        chunk_id: 123e4567-e89b-12d3-a456-426614174000
        chunk_index: 0
        content: Sample chunk content...
        fusion_method: weighted_sum
        hybrid_score: 0.88
        job_id: 123e4567-e89b-12d3-a456-426614174001
        metadata:
          page: 1
        rank: 1
        text_rank: 2
        text_score: 0.78
        vector_rank: 1
        vector_score: 0.92
    HybridSearchResultsResponse:
      properties:
        results:
          items:
            $ref: '#/components/schemas/HybridSearchResultItem'
          type: array
          title: Results
          description: Search results
        total:
          type: integer
          minimum: 0.0
          title: Total
          description: Total number of results
        query_time_ms:
          type: number
          title: Query Time Ms
          description: Query execution time in milliseconds
      type: object
      required:
      - total
      - query_time_ms
      title: HybridSearchResultsResponse
      description: Response model for hybrid search results.
    InvalidEmbeddingResponse:
      properties:
        detail:
          type: string
          title: Detail
          default: Invalid embedding vector
      type: object
      title: InvalidEmbeddingResponse
      description: Error response for invalid embedding.
    InvalidQueryResponse:
      properties:
        detail:
          type: string
          title: Detail
          default: Invalid search query
      type: object
      title: InvalidQueryResponse
      description: Error response for invalid query.
    JobNotFoundResponse:
      properties:
        detail:
          type: string
          title: Detail
          default: Job not found
      type: object
      title: JobNotFoundResponse
      description: Error response when job is not found.
    LivenessResponse:
      properties:
        alive:
          type: boolean
          title: Alive
        timestamp:
          type: string
          title: Timestamp
      type: object
      required:
      - alive
      - timestamp
      title: LivenessResponse
      description: Kubernetes liveness probe response.
    QueryType:
      type: string
      enum:
      - factual
      - analytical
      - comparative
      - vague
      - multi_hop
      title: QueryType
      description: "Query classification types for RAG strategy selection.\n\nThis\
        \ enum defines the different types of queries that can be classified\nto determine\
        \ the optimal RAG retrieval strategy.\n\nAttributes:\n    FACTUAL: Simple\
        \ fact lookup (e.g., \"What is X?\", \"Who is Y?\")\n    ANALYTICAL: Requires\
        \ explanation or synthesis (e.g., \"Explain X\", \"How does Y work?\")\n \
        \   COMPARATIVE: Compares multiple items (e.g., \"Compare X and Y\", \"Pros/cons\"\
        )\n    VAGUE: Unclear or broad queries (e.g., \"Tell me about...\", \"Information\
        \ on...\")\n    MULTI_HOP: Requires multiple retrieval steps (e.g., \"Author\
        \ of X on topic Y\")"
    RAGBenchmarkRequest:
      properties:
        benchmark_name:
          type: string
          minLength: 1
