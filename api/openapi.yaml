      - System
      summary: Get Queue Health
      description: Queue health and status.
      operationId: get_queue_health_health_queue_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get Queue Health Health Queue Get
  /metrics:
    get:
      tags:
      - System
      summary: Get Metrics
      description: Prometheus metrics endpoint.
      operationId: get_metrics_metrics_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
