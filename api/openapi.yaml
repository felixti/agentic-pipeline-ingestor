openapi: 3.1.0
info:
  title: Content Detection API
  version: 1.0.0
  description: |
    API for detecting content type of PDF documents.
    
    Automatically classifies PDFs as:
    - **text_based**: Documents with extractable text layers
    - **scanned**: Image-based documents requiring OCR
    - **mixed**: Documents with both text and significant image content

servers:
  - url: http://localhost:8000/api/v1
    description: Local development

paths:
  /detect:
    post:
      operationId: detectContent
      summary: Detect content type of uploaded PDF
      description: Upload a PDF file and detect whether it's text-based, scanned, or mixed content.
      tags:
        - Content Detection
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to analyze
                detailed:
                  type: boolean
                  default: false
                  description: Include detailed per-page analysis
      responses:
        '200':
          description: Successful detection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResponse'
        '400':
          description: Invalid file or request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /detect/url:
    post:
      operationId: detectContentFromUrl
      summary: Detect content type from URL
      description: Download a PDF from URL and detect its content type.
      tags:
        - Content Detection
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DetectionUrlRequest'
      responses:
        '200':
          description: Successful detection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetectionResponse'
        '400':
          description: Invalid URL or request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /detect/batch:
    post:
      operationId: detectContentBatch
      summary: Batch content detection
      description: Detect content type for multiple PDF files (max 10).
      tags:
        - Content Detection
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: PDF files to analyze (max 10)
                detailed:
                  type: boolean
                  default: false
      responses:
        '200':
          description: Successful batch detection
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchDetectionResponse'
        '400':
          description: Invalid files or request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /jobs/{jobId}/parser-selection:
    get:
      operationId: getParserSelection
      summary: Get parser selection for a job
      description: Retrieve parser selection based on content detection result.
      tags:
        - Pipeline
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Parser selection details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParserSelectionResponse'

  /jobs:
    get:
      operationId: listJobs
      summary: List all jobs
      description: Retrieve a paginated list of jobs with optional filtering.
      tags:
        - Jobs
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [created, queued, processing, completed, failed, cancelled]
        - name: source_type
          in: query
          schema:
            type: string
      responses:
        '200':
          description: List of jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobListResponse'
    
    post:
      operationId: createJob
      summary: Create a new job
      description: Submit a new ingestion job for processing.
      tags:
        - Jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobCreateRequest'
      responses:
        '202':
          description: Job created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'

  /jobs/{jobId}:
    parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      operationId: getJob
      summary: Get job details
      description: Retrieve detailed information about a specific job.
      tags:
        - Jobs
      responses:
        '200':
          description: Job details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResponse'
        '404':
          description: Job not found
    
    delete:
      operationId: cancelJob
      summary: Cancel a job
      description: Cancel a job that is in created, queued, or processing state.
      tags:
        - Jobs
      responses:
        '204':
          description: Job cancelled successfully
        '400':
          description: Cannot cancel job in current state
        '404':
          description: Job not found

  /jobs/{jobId}/hard:
    parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    delete:
      operationId: deleteJobHard
      summary: Permanently delete a job and its chunks
      description: |
        **⚠️ DANGER:** Permanently deletes a job and all its associated chunks.
        This operation cannot be undone. Use with caution.
      tags:
        - Jobs
      responses:
        '204':
          description: Job and chunks deleted successfully
        '404':
          description: Job not found
        '500':
          description: Failed to delete job

  /jobs/bulk-delete:
    post:
      operationId: bulkDeleteJobs
      summary: Bulk delete jobs
      description: Delete multiple jobs and their chunks in a single operation.
      tags:
        - Jobs
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkDeleteRequest'
      responses:
        '200':
          description: Bulk delete results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkDeleteResponse'

  /jobs/{jobId}/retry:
    parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    post:
      operationId: retryJob
      summary: Retry a failed job
      description: Create a new job with the same configuration as a failed job.
      tags:
        - Jobs
      responses:
        '202':
          description: Job retry initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobRetryResponse'
        '400':
          description: Only failed jobs can be retried
        '404':
          description: Job not found

  /jobs/{jobId}/result:
    parameters:
      - name: jobId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      operationId: getJobResult
      summary: Get job processing result
      description: Retrieve the processing result for a completed job.
      tags:
        - Jobs
      responses:
        '200':
          description: Job result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobResultResponse'
        '400':
          description: Job not complete
        '404':
          description: Job not found

components:
  schemas:
    DetectionRequest:
      type: object
      properties:
        detailed:
          type: boolean
          default: false

    DetectionUrlRequest:
      type: object
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          example: https://example.com/document.pdf
        headers:
          type: object
          additionalProperties:
            type: string
        detailed:
          type: boolean
          default: false

    DetectionResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          $ref: '#/components/schemas/DetectionResult'
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    DetectionResult:
      type: object
      required:
        - content_type
        - confidence
        - recommended_parser
        - text_statistics
        - image_statistics
        - processing_time_ms
        - file_hash
        - file_size
      properties:
        content_type:
          type: string
          enum: [text_based, scanned, mixed]
        confidence:
          type: number
          minimum: 0
          maximum: 1
        recommended_parser:
          type: string
        alternative_parsers:
          type: array
          items:
            type: string
        text_statistics:
          $ref: '#/components/schemas/TextStatistics'
        image_statistics:
          $ref: '#/components/schemas/ImageStatistics'
        page_results:
          type: array
          items:
            $ref: '#/components/schemas/PageResult'
        processing_time_ms:
          type: integer
        file_hash:
          type: string
        file_size:
          type: integer

    TextStatistics:
      type: object
      properties:
        total_pages:
          type: integer
        total_characters:
          type: integer
        has_text_layer:
          type: boolean
        font_count:
          type: integer
        encoding:
          type: string
          nullable: true
        average_chars_per_page:
          type: number

    ImageStatistics:
      type: object
      properties:
        total_images:
          type: integer
        image_area_ratio:
          type: number
        average_dpi:
          type: integer
          nullable: true
        color_pages:
          type: integer

    PageResult:
      type: object
      properties:
        page_number:
          type: integer
        content_type:
          type: string
          enum: [text_based, scanned, mixed]
        confidence:
          type: number
        text_ratio:
          type: number
        image_ratio:
          type: number
        character_count:
          type: integer
        image_count:
          type: integer

    BatchDetectionResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: object
          properties:
            results:
              type: array
              items:
                $ref: '#/components/schemas/BatchDetectionItem'
            summary:
              type: object
              properties:
                total:
                  type: integer
                successful:
                  type: integer
                errors:
                  type: integer
                text_based:
                  type: integer
                scanned:
                  type: integer
                mixed:
                  type: integer
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    BatchDetectionItem:
      type: object
      properties:
        filename:
          type: string
        content_type:
          type: string
        confidence:
          type: number
        recommended_parser:
          type: string
        processing_time_ms:
          type: integer
        error:
          type: string
          nullable: true

    ParserSelectionResponse:
      type: object
      required:
        - data
        - meta
      properties:
        data:
          type: object
          properties:
            job_id:
              type: string
            detection_result:
              type: object
            selection:
              type: object
              properties:
                primary_parser:
                  type: string
                fallback_parser:
                  type: string
                  nullable: true
                rationale:
                  type: string
                overridden:
                  type: boolean
            estimated_processing_time:
              type: string
            estimated_cost:
              type: number
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    ResponseMeta:
      type: object
      required:
        - request_id
        - timestamp
        - api_version
      properties:
        request_id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        api_version:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
        - meta
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    # Job Schemas
    JobCreateRequest:
      type: object
      required:
        - source_type
      properties:
        source_type:
          type: string
          enum: [upload, s3, url, gcs, azure_blob]
          example: upload
        source_uri:
          type: string
          description: URI to the source file (if not upload)
        file_name:
          type: string
          example: document.pdf
        file_size:
          type: integer
          example: 1024567
        mime_type:
          type: string
          example: application/pdf
        priority:
          type: string
          enum: [low, normal, high]
          default: normal
        mode:
          type: string
          enum: [sync, async]
          default: async
        external_id:
          type: string
          description: External reference ID
        metadata:
          type: object
          description: Additional metadata
        pipeline_id:
          type: string
          description: Pipeline configuration ID

    JobResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [created, queued, processing, completed, failed, cancelled]
        source_type:
          type: string
        source_uri:
          type: string
        file_name:
          type: string
        file_size:
          type: integer
        mime_type:
          type: string
        priority:
          type: integer
        mode:
          type: string
        external_id:
          type: string
        retry_count:
          type: integer
        max_retries:
          type: integer
        error:
          type: object
          nullable: true
          properties:
            message:
              type: string
            code:
              type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true

    JobListResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/JobResponse'
            total:
              type: integer
            page:
              type: integer
            page_size:
              type: integer
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    JobRetryResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            original_job_id:
              type: string
              format: uuid
            new_job_id:
              type: string
              format: uuid
            status:
              type: string
            message:
              type: string
            job:
              $ref: '#/components/schemas/JobResponse'
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    JobResultResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            job_id:
              type: string
            status:
              type: string
            success:
              type: boolean
            extracted_text:
              type: string
              nullable: true
            output_data:
              type: object
              nullable: true
            metadata:
              type: object
              nullable: true
            quality_score:
              type: number
              nullable: true
            processing_time_ms:
              type: integer
              nullable: true
            output_uri:
              type: string
              nullable: true
            created_at:
              type: string
              format: date-time
              nullable: true
        meta:
          $ref: '#/components/schemas/ResponseMeta'

    BulkDeleteRequest:
      type: object
      required:
        - job_ids
      properties:
        job_ids:
          type: array
          description: List of job IDs to delete
          items:
            type: string
            format: uuid
          example: ["e38d4503-0c10-4d3e-8851-8b8322a83453"]
        dry_run:
          type: boolean
          description: If true, returns what would be deleted without actually deleting
          default: false

    BulkDeleteResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            summary:
              type: object
              properties:
                total_requested:
                  type: integer
                jobs_deleted:
                  type: integer
                jobs_not_found:
                  type: integer
                jobs_failed:
                  type: integer
                total_chunks_deleted:
                  type: integer
                dry_run:
                  type: boolean
            details:
              type: object
              properties:
                deleted:
                  type: array
                  items:
                    type: object
                    properties:
                      job_id:
                        type: string
                      file_name:
                        type: string
                      chunks:
                        type: integer
                not_found:
                  type: array
                  items:
                    type: string
                failed:
                  type: array
                  items:
                    type: object
                    properties:
                      job_id:
                        type: string
                      error:
                        type: string
        meta:
          $ref: '#/components/schemas/ResponseMeta'
