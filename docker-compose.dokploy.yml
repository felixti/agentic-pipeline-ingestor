# Docker Compose para Dokploy
# Versão adaptada para usar serviços externos do Dokploy (PostgreSQL e Redis)
#
# NOTA: Não usar 'container_name' pois o Dokploy gerencia os nomes automaticamente.
# Usar container_name fixo causa conflitos durante o redeploy.

services:
  # ============================================================================
  # API Service
  # ============================================================================
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      # Application
      - DEBUG=false
      - ENV=production
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=4
      
      # Database (usando serviço externo do Dokploy)
      - DB_URL=${DB_URL}
      - DB_ECHO=false
      
      # Redis (usando serviço externo do Dokploy)
      - REDIS_URL=${REDIS_URL}
      
      # OpenSearch (desabilitado - usar logs do Dokploy)
      - OPENSEARCH_HOSTS=[]
      
      # Security
      - SECRET_KEY=${SECRET_KEY}
      
      # Observability
      - OTEL_SERVICE_NAME=pipeline-api
      - OTEL_ENVIRONMENT=production
      - OTEL_LOG_LEVEL=INFO
      
      # LLM Configuration
      - AZURE_OPENAI_API_BASE=${AZURE_OPENAI_API_BASE:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      
      # Azure AI Vision (for OCR)
      - AZURE_AI_VISION_ENDPOINT=${AZURE_AI_VISION_ENDPOINT:-}
      - AZURE_AI_VISION_API_KEY=${AZURE_AI_VISION_API_KEY:-}
      
      # Cognee Local (Neo4j + pgvector)
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - COGNEE_LLM_PROVIDER=${COGNEE_LLM_PROVIDER:-litellm}
      - COGNEE_LLM_MODEL=${COGNEE_LLM_MODEL:-azure/gpt-4.1}
      - COGNEE_EMBEDDING_MODEL=${COGNEE_EMBEDDING_MODEL:-azure/text-embedding-3-small}
      - COGNEE_HOME=/data/cognee
      - COGNEE_VECTOR_PROVIDER=pgvector
      # Cognee PostgreSQL Configuration (using existing pipeline database)
      - DB_PROVIDER=postgres
      - DB_HOST=${POSTGRES_HOST:-postgres}
      - DB_PORT=${POSTGRES_PORT:-5432}
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB:-pipeline}
      
      # HippoRAG (File-based multi-hop reasoning)
      - HIPPO_SAVE_DIR=${HIPPO_SAVE_DIR:-/data/hipporag}
      - HIPPO_LLM_MODEL=${HIPPO_LLM_MODEL:-azure/gpt-4.1}
      - HIPPO_EMBEDDING_MODEL=${HIPPO_EMBEDDING_MODEL:-azure/text-embedding-3-small}
      
      # Processing
      - PROCESSING_MAX_FILE_SIZE_MB=100
      - PROCESSING_MAX_PAGES_PER_DOCUMENT=1000
      - PROCESSING_TEMP_DIR=/tmp/pipeline
      - PROCESSING_CLEANUP_TEMP_FILES=true
      - PROCESSING_DEFAULT_TIMEOUT_SECONDS=300
      - PROCESSING_MAX_RETRIES=3
      
    volumes:
      - pipeline-uploads:/tmp/pipeline
      - hipporag-data:/data/hipporag
      - cognee-data:/data/cognee
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # Worker Service
  # ============================================================================
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: python -m src.worker.main
    environment:
      - DEBUG=false
      - ENV=production
      - DB_URL=${DB_URL}
      - REDIS_URL=${REDIS_URL}
      - OPENSEARCH_HOSTS=[]
      - OTEL_SERVICE_NAME=pipeline-worker
      - OTEL_ENVIRONMENT=production
      
      # LLM Configuration
      - AZURE_OPENAI_API_BASE=${AZURE_OPENAI_API_BASE:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      
      # Azure AI Vision
      - AZURE_AI_VISION_ENDPOINT=${AZURE_AI_VISION_ENDPOINT:-}
      - AZURE_AI_VISION_API_KEY=${AZURE_AI_VISION_API_KEY:-}
      
      # Cognee Local (Neo4j + pgvector)
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - COGNEE_LLM_PROVIDER=${COGNEE_LLM_PROVIDER:-litellm}
      - COGNEE_LLM_MODEL=${COGNEE_LLM_MODEL:-azure/gpt-4.1}
      - COGNEE_EMBEDDING_MODEL=${COGNEE_EMBEDDING_MODEL:-azure/text-embedding-3-small}
      - COGNEE_HOME=/data/cognee
      - COGNEE_VECTOR_PROVIDER=pgvector
      # Cognee PostgreSQL Configuration (using existing pipeline database)
      - DB_PROVIDER=postgres
      - DB_HOST=${POSTGRES_HOST:-postgres}
      - DB_PORT=${POSTGRES_PORT:-5432}
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB:-pipeline}
      
      # HippoRAG (File-based multi-hop reasoning)
      - HIPPO_SAVE_DIR=${HIPPO_SAVE_DIR:-/data/hipporag}
      - HIPPO_LLM_MODEL=${HIPPO_LLM_MODEL:-azure/gpt-4.1}
      - HIPPO_EMBEDDING_MODEL=${HIPPO_EMBEDDING_MODEL:-azure/text-embedding-3-small}
      
      # Worker Configuration
      - WORKER_POLL_INTERVAL=5.0
      - WORKER_MAX_CONCURRENT=3
      
    volumes:
      - pipeline-uploads:/tmp/pipeline
      - hipporag-data:/data/hipporag
      - cognee-data:/data/cognee
    restart: unless-stopped
    deploy:
      replicas: 2

  # ============================================================================
  # Neo4j Graph Database (for Cognee)
  # ============================================================================
  neo4j:
    image: neo4j:5.15-community
    ports:
      - "7687:7687"  # Bolt protocol
      - "7474:7474"  # HTTP/Browser
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD}
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5

# ============================================================================
# Volumes
# ============================================================================
volumes:
  pipeline-uploads:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
  hipporag-data:
    driver: local
  cognee-data:
    driver: local
