# Docker Compose para Produção (Dokploy)
# Usa variáveis de ambiente para todas as configurações sensíveis

services:
  # ============================================================================
  # API Service
  # ============================================================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pipeline-api
    ports:
      - "8000:8000"
    environment:
      # Application
      - DEBUG=${DEBUG:-false}
      - ENV=${ENV:-production}
      - HOST=0.0.0.0
      - PORT=8000
      - WORKERS=${WORKERS:-4}
      
      # Database (via variável de ambiente)
      - DB_URL=${DB_URL}
      - DB_ECHO=${DB_ECHO:-false}
      
      # Redis (via variável de ambiente)
      - REDIS_URL=${REDIS_URL}
      
      # OpenSearch (opcional)
      - OPENSEARCH_HOSTS=${OPENSEARCH_HOSTS:-[]}
      
      # Security
      - SECRET_KEY=${SECRET_KEY}
      
      # Observability
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-pipeline-api}
      - OTEL_ENVIRONMENT=${OTEL_ENVIRONMENT:-production}
      - OTEL_LOG_LEVEL=${OTEL_LOG_LEVEL:-INFO}
      
      # LLM Configuration
      - AZURE_OPENAI_API_BASE=${AZURE_OPENAI_API_BASE:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-02-01}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      
      # Azure AI Vision
      - AZURE_AI_VISION_ENDPOINT=${AZURE_AI_VISION_ENDPOINT:-}
      - AZURE_AI_VISION_API_KEY=${AZURE_AI_VISION_API_KEY:-}
      
      # Cognee Configuration
      # See: https://docs.cognee.ai/setup-configuration/overview
      
      # Cognee LLM & Embeddings
      - COGNEE_LLM_PROVIDER=${COGNEE_LLM_PROVIDER:-litellm}
      - COGNEE_LLM_MODEL=${COGNEE_LLM_MODEL:-azure/gpt-4.1}
      - COGNEE_EMBEDDING_MODEL=${COGNEE_EMBEDDING_MODEL:-azure/text-embedding-3-small}
      
      # LiteLLM Azure Configuration (required by Cognee)
      - AZURE_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_API_BASE=${AZURE_OPENAI_API_BASE:-}
      - AZURE_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-02-01}
      
      # Cognee LLM Configuration (uses LLM_API_KEY not AZURE_API_KEY)
      - LLM_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - LLM_MODEL=${COGNEE_LLM_MODEL:-azure/gpt-4.1}
      - EMBEDDING_MODEL=${COGNEE_EMBEDDING_MODEL:-azure/text-embedding-3-small}
      
      # Cognee Storage Directories
      - DATA_ROOT_DIRECTORY=/data/cognee/data
      - SYSTEM_ROOT_DIRECTORY=/data/cognee/system
      
      # Cognee Relational Database (PostgreSQL for metadata & structured data)
      # https://docs.cognee.ai/setup-configuration/relational-databases
      - DB_PROVIDER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB:-pipeline}
      
      # Cognee Vector Store (PGVector for embeddings)
      # https://docs.cognee.ai/setup-configuration/vector-stores
      - VECTOR_DB_PROVIDER=pgvector
      
      # Cognee Graph Store (Neo4j for knowledge graphs)
      # https://docs.cognee.ai/setup-configuration/graph-stores
      - GRAPH_DATABASE_PROVIDER=neo4j
      - GRAPH_DATABASE_URL=${NEO4J_URI:-bolt://neo4j:7687}
      - GRAPH_DATABASE_USERNAME=${NEO4J_USER:-neo4j}
      - GRAPH_DATABASE_PASSWORD=${NEO4J_PASSWORD:-cognee-graph-db}
      
      # Disable multi-user access control to avoid dataset handler conflicts
      # https://docs.cognee.ai/setup-configuration/overview
      - ENABLE_BACKEND_ACCESS_CONTROL=false
      
      # HippoRAG (File-based multi-hop reasoning)
      - HIPPO_SAVE_DIR=${HIPPO_SAVE_DIR:-/data/hipporag}
      - HIPPO_LLM_MODEL=${HIPPO_LLM_MODEL:-azure/gpt-4.1}
      - HIPPO_EMBEDDING_MODEL=${HIPPO_EMBEDDING_MODEL:-azure/text-embedding-3-small}
      
      # Processing
      - PROCESSING_MAX_FILE_SIZE_MB=${PROCESSING_MAX_FILE_SIZE_MB:-100}
      - PROCESSING_MAX_PAGES_PER_DOCUMENT=${PROCESSING_MAX_PAGES_PER_DOCUMENT:-1000}
      - PROCESSING_TEMP_DIR=/tmp/pipeline
      - PROCESSING_CLEANUP_TEMP_FILES=true
      - PROCESSING_DEFAULT_TIMEOUT_SECONDS=${PROCESSING_DEFAULT_TIMEOUT_SECONDS:-300}
      - PROCESSING_MAX_RETRIES=${PROCESSING_MAX_RETRIES:-3}
      
    volumes:
      - pipeline-uploads:/tmp/pipeline
      - hipporag-data:/data/hipporag
      - cognee-data:/data/cognee
    networks:
      - pipeline-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================================================
  # Worker Service
  # ============================================================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m src.worker.main
    environment:
      - DEBUG=${DEBUG:-false}
      - ENV=${ENV:-production}
      - DB_URL=${DB_URL}
      - REDIS_URL=${REDIS_URL}
      - OPENSEARCH_HOSTS=${OPENSEARCH_HOSTS:-[]}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME:-pipeline-worker}
      - OTEL_ENVIRONMENT=${OTEL_ENVIRONMENT:-production}
      
      # LLM Configuration
      - AZURE_OPENAI_API_BASE=${AZURE_OPENAI_API_BASE:-}
      - AZURE_OPENAI_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_OPENAI_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-02-01}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      
      # Azure AI Vision
      - AZURE_AI_VISION_ENDPOINT=${AZURE_AI_VISION_ENDPOINT:-}
      - AZURE_AI_VISION_API_KEY=${AZURE_AI_VISION_API_KEY:-}
      
      # Cognee Configuration
      # See: https://docs.cognee.ai/setup-configuration/overview
      
      # Cognee LLM & Embeddings
      - COGNEE_LLM_PROVIDER=${COGNEE_LLM_PROVIDER:-litellm}
      - COGNEE_LLM_MODEL=${COGNEE_LLM_MODEL:-azure/gpt-4.1}
      - COGNEE_EMBEDDING_MODEL=${COGNEE_EMBEDDING_MODEL:-azure/text-embedding-3-small}
      
      # LiteLLM Azure Configuration (required by Cognee)
      - AZURE_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - AZURE_API_BASE=${AZURE_OPENAI_API_BASE:-}
      - AZURE_API_VERSION=${AZURE_OPENAI_API_VERSION:-2024-02-01}
      
      # Cognee LLM Configuration (uses LLM_API_KEY not AZURE_API_KEY)
      - LLM_API_KEY=${AZURE_OPENAI_API_KEY:-}
      - LLM_MODEL=${COGNEE_LLM_MODEL:-azure/gpt-4.1}
      - EMBEDDING_MODEL=${COGNEE_EMBEDDING_MODEL:-azure/text-embedding-3-small}
      
      # Cognee Storage Directories
      - DATA_ROOT_DIRECTORY=/data/cognee/data
      - SYSTEM_ROOT_DIRECTORY=/data/cognee/system
      
      # Cognee Relational Database (PostgreSQL for metadata & structured data)
      # https://docs.cognee.ai/setup-configuration/relational-databases
      - DB_PROVIDER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD}
      - DB_NAME=${POSTGRES_DB:-pipeline}
      
      # Cognee Vector Store (PGVector for embeddings)
      # https://docs.cognee.ai/setup-configuration/vector-stores
      - VECTOR_DB_PROVIDER=pgvector
      
      # Cognee Graph Store (Neo4j for knowledge graphs)
      # https://docs.cognee.ai/setup-configuration/graph-stores
      - GRAPH_DATABASE_PROVIDER=neo4j
      - GRAPH_DATABASE_URL=${NEO4J_URI:-bolt://neo4j:7687}
      - GRAPH_DATABASE_USERNAME=${NEO4J_USER:-neo4j}
      - GRAPH_DATABASE_PASSWORD=${NEO4J_PASSWORD:-cognee-graph-db}
      
      # Disable multi-user access control to avoid dataset handler conflicts
      # https://docs.cognee.ai/setup-configuration/overview
      - ENABLE_BACKEND_ACCESS_CONTROL=false
      
      # HippoRAG (File-based multi-hop reasoning)
      - HIPPO_SAVE_DIR=${HIPPO_SAVE_DIR:-/data/hipporag}
      - HIPPO_LLM_MODEL=${HIPPO_LLM_MODEL:-azure/gpt-4.1}
      - HIPPO_EMBEDDING_MODEL=${HIPPO_EMBEDDING_MODEL:-azure/text-embedding-3-small}
      
      # Worker Configuration
      - WORKER_POLL_INTERVAL=${WORKER_POLL_INTERVAL:-5.0}
      - WORKER_MAX_CONCURRENT=${WORKER_MAX_CONCURRENT:-3}
      
    volumes:
      - pipeline-uploads:/tmp/pipeline
      - hipporag-data:/data/hipporag
      - cognee-data:/data/cognee
    networks:
      - pipeline-network
    restart: unless-stopped
    deploy:
      replicas: ${WORKER_REPLICAS:-2}

  # ============================================================================
  # PostgreSQL Database (with pgvector extension)
  # ============================================================================
  postgres:
    image: pgvector/pgvector:pg17
    container_name: pipeline-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-pipeline}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - pipeline-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================================
  # Redis Cache
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: pipeline-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - pipeline-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # Neo4j - Graph Database for Cognee
  # ============================================================================
  neo4j:
    image: neo4j:5.15-community
    container_name: pipeline-neo4j
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-cognee-graph-db}
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
      # Enable Neo4j Browser access from any host
      - NEO4J_dbms_connector_http_listen__address=0.0.0.0:7474
      - NEO4J_dbms_connector_bolt_listen__address=0.0.0.0:7687
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*,gds.*
      # Disable Bolt TLS for direct connections (use bolt:// not bolt+s://)
      - NEO4J_dbms_ssl_policy_bolt_enabled=false
      - NEO4J_dbms_connector_bolt_tls__level=DISABLED
      # Advertise correct addresses for Browser connection
      - NEO4J_dbms_connector_bolt_advertised__address=pipeline-neo4j.felixtek.cloud:7687
      - NEO4J_dbms_connector_http_advertised__address=pipeline-neo4j.felixtek.cloud:7474
    ports:
      - "7687:7687"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    networks:
      - pipeline-network
      - dokploy-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.neo4j.rule=Host(`pipeline-neo4j.felixtek.cloud`)"
      - "traefik.http.routers.neo4j.entrypoints=web"
      - "traefik.http.services.neo4j.loadbalancer.server.port=7474"
      - "traefik.http.routers.neo4j.service=neo4j"
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "${NEO4J_USER:-neo4j}", "-p", "${NEO4J_PASSWORD:-cognee-graph-db}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================================
  # Arize Phoenix - OpenTelemetry Native Observability
  # ============================================================================
  phoenix:
    image: arizephoenix/phoenix:latest
    container_name: pipeline-phoenix
    ports:
      - "6006:6006"      # Phoenix UI
      - "4317:4317"      # OTLP gRPC
      - "4318:4318"      # OTLP HTTP
    environment:
      - PHOENIX_PROJECT_NAME=${PHOENIX_PROJECT_NAME:-agentic-pipeline}
      - PHOENIX_API_KEY=${PHOENIX_API_KEY:-}
      - PHOENIX_ENABLE_AUTH=${PHOENIX_ENABLE_AUTH:-false}
      - PHOENIX_SQL_DATABASE_URL=${PHOENIX_SQL_DATABASE_URL:-}
    volumes:
      - phoenix-data:/app/data
    networks:
      - pipeline-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6006/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ============================================================================
# Volumes
# ============================================================================
volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  pipeline-uploads:
    driver: local
  phoenix-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
  hipporag-data:
    driver: local
  cognee-data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  pipeline-network:
    driver: bridge
  dokploy-network:
    external: true
